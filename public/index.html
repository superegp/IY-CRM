<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IY-CRM - Customer Relationship Management</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- Login Section -->
        <div id="loginSection" class="section">
            <div class="container">
                <h1>IY-CRM</h1>
                <div class="login-form">
                    <h2>Login</h2>
                    <form id="loginForm">
                        <input type="text" id="username" placeholder="Username" required>
                        <input type="password" id="password" placeholder="Password" required>
                        <button type="submit">Login</button>
                    </form>
                    <p>Don't have an account? <a href="#" id="showRegister">Register</a></p>
                </div>
                
                <div class="register-form hidden">
                    <h2>Register</h2>
                    <form id="registerForm">
                        <input type="text" id="regUsername" placeholder="Username" required>
                        <input type="email" id="regEmail" placeholder="Email" required>
                        <input type="password" id="regPassword" placeholder="Password" required>
                        <button type="submit">Register</button>
                    </form>
                    <p>Already have an account? <a href="#" id="showLogin">Login</a></p>
                </div>
            </div>
        </div>

        <!-- Main Application Section -->
        <div id="mainSection" class="section hidden">
            <header>
                <h1>IY-CRM Dashboard</h1>
                <div class="user-info">
                    <span id="userInfo"></span>
                    <button id="logoutBtn">Logout</button>
                </div>
            </header>

            <nav>
                <button class="nav-btn active" data-section="dashboard">Dashboard</button>
                <button class="nav-btn" data-section="customers">Customers</button>
                <button class="nav-btn" data-section="leads">Leads</button>
                <button class="nav-btn" data-section="contacts">Contacts</button>
            </nav>

            <main>
                <!-- Dashboard -->
                <div id="dashboard" class="content-section">
                    <h2>Dashboard</h2>
                    <div class="stats">
                        <div class="stat-card">
                            <h3>Total Customers</h3>
                            <p id="customerCount">-</p>
                        </div>
                        <div class="stat-card">
                            <h3>Active Leads</h3>
                            <p id="leadCount">-</p>
                        </div>
                        <div class="stat-card">
                            <h3>Recent Contacts</h3>
                            <p id="contactCount">-</p>
                        </div>
                    </div>
                </div>

                <!-- Customers -->
                <div id="customers" class="content-section hidden">
                    <div class="section-header">
                        <h2>Customers</h2>
                        <button id="addCustomerBtn" class="btn-primary">Add Customer</button>
                    </div>
                    <div class="search-bar">
                        <input type="text" id="customerSearch" placeholder="Search customers...">
                    </div>
                    <div id="customerList" class="data-list"></div>
                </div>

                <!-- Leads -->
                <div id="leads" class="content-section hidden">
                    <div class="section-header">
                        <h2>Leads</h2>
                        <button id="addLeadBtn" class="btn-primary">Add Lead</button>
                    </div>
                    <div class="filters">
                        <select id="leadStatusFilter">
                            <option value="">All Statuses</option>
                            <option value="new">New</option>
                            <option value="contacted">Contacted</option>
                            <option value="qualified">Qualified</option>
                            <option value="converted">Converted</option>
                        </select>
                    </div>
                    <div id="leadList" class="data-list"></div>
                </div>

                <!-- Contacts -->
                <div id="contacts" class="content-section hidden">
                    <div class="section-header">
                        <h2>Contacts</h2>
                        <button id="addContactBtn" class="btn-primary">Add Contact</button>
                    </div>
                    <div id="contactList" class="data-list"></div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal for forms -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
